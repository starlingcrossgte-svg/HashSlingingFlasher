plugins {
    id 'com.android.application'
}

android {
    namespace 'com.ecuflasher'
    compileSdk 34

    defaultConfig {
        applicationId "com.ecuflasher"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            debuggable true
        }
    }
}

dependencies {
}
