- name: Download Android SDK Command-line Tools
  run: |
    if [ ! -d "$HOME/android-sdk/cmdline-tools" ]; then
      mkdir -p $HOME/android-sdk
      cd $HOME/android-sdk
      wget https://dl.google.com/android/repository/commandlinetools-linux-9123335_latest.zip -O cmdline-tools.zip
      unzip cmdline-tools.zip
      mkdir -p cmdline-tools/latest
      mv cmdline-tools/* cmdline-tools/latest
    else
      echo "cmdline-tools already exists, skipping download"
    fi
    echo "export ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
    echo "export PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_ENV
