name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Download Android SDK Command-line Tools
        run: |
          if [ ! -d "$HOME/android-sdk/cmdline-tools" ]; then
            mkdir -p $HOME/android-sdk
            cd $HOME/android-sdk
            wget https://dl.google.com/android/repository/commandlinetools-linux-9123335_latest.zip -O cmdline-tools.zip
            unzip cmdline-tools.zip
            mkdir -p cmdline-tools/latest
            mv cmdline-tools/* cmdline-tools/latest
          else
            echo "cmdline-tools already exists, skipping download"
          fi
          echo "export ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "export PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_ENV

      - name: Accept Android SDK licenses
        run: yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Install required SDK packages
        run: $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34"

      - name: Build APK
        run: ./gradlew assembleDebug
